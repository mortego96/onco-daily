name: Digest diario

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generar el digest
        run: node buildDigest.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}

      - name: Guardar el digest
        run: |
          git config user.name "onco-daily bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "Sin cambios que guardar"
            exit 0
          fi
          git commit -m "Digest $(date +%F)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "Conflicto al guardar, reintento $i..."
            sleep 5
          done
          echo "No se pudo guardar tras varios intentos"
          exit 1
